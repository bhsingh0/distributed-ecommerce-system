server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 102400

scrape_configs:
  - job_name: order-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: order-service
          service: order-service
          __path__: /var/log/order-service/order-service.log

  - job_name: payment-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: payment-service
          service: payment-service
          __path__: /var/log/payment-service/payment-service.log