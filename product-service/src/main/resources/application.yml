server:
  port: 8084

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:mysql://localhost:3306/productdb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/ecommerce-platform

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG